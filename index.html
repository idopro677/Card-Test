<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Object Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #canvas-wrapper { position: relative; display: inline-block; margin-top: 20px; border: 2px solid #ddd; }
        canvas { display: block; max-width: 100%; height: auto; }
        .controls { margin-bottom: 20px; }
        #status { color: #666; font-style: italic; margin-bottom: 10px; }
        input[type="file"] { margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>YOLOv8 Image Processor</h1>
    <p id="status">Loading model...</p>
    
    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*" disabled>
    </div>

    <div id="canvas-wrapper">
        <canvas id="outputCanvas"></canvas>
    </div>
</div>

<script>
    const status = document.getElementById('status');
    const imageUpload = document.getElementById('imageUpload');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    let model;
    // Replace these with your actual class names from your training
    const labels = ["Class_0", "Class_1", "Class_2"]; 

    // 1. Load the Model
    async function loadModel() {
        try {
            // Assumes files are in a folder named 'model'
            model = await tf.loadGraphModel('model/model.json');
            status.innerText = "Model loaded. Upload an image!";
            imageUpload.disabled = false;
        } catch (err) {
            status.innerText = "Error loading model: " + err.message;
        }
    }

    // 2. Process Uploaded Image
    imageUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            status.innerText = "Processing...";
            
            // Set canvas size to original image size for display
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            // Run detection
            await detect(img);
            status.innerText = "Detection complete.";
        };
    });

    // 3. Run Inference
    async function detect(source) {
        const [modelWidth, modelHeight] = [640, 640];

        const tensor = tf.tidy(() => {
            return tf.browser.fromPixels(source)
                .resizeNearestNeighbor([modelWidth, modelHeight])
                .toFloat()
                .div(255.0)
                .expandDims(0);
        });

        const predictions = await model.executeAsync(tensor);
        
        // YOLOv8 output is usually [1, 84, 8400] or [1, 8400, 84]
        // We need to transpose and process
        const res = predictions.arraySync()[0]; 
        renderBoxes(res, source.width, source.height);

        tf.dispose([tensor, predictions]);
    }

    // 4. Draw Results
    function renderBoxes(output, imgWidth, imgHeight) {
        ctx.strokeStyle = "#00FF00";
        ctx.lineWidth = 3;
        ctx.font = "16px Arial";
        ctx.fillStyle = "#00FF00";

        // This loop handles the common YOLOv8 output format
        // output[0...3] are x,y,w,h; output[4...] are class scores
        for (let i = 0; i < 8400; i++) {
            const classes = output.slice(4).map(col => col[i]);
            const probability = Math.max(...classes);

            if (probability > 0.5) {
                const classId = classes.indexOf(probability);
                
                // Scale coordinates back to original image size
                let x = output[0][i] * (imgWidth / 640);
                let y = output[1][i] * (imgHeight / 640);
                let w = output[2][i] * (imgWidth / 640);
                let h = output[3][i] * (imgHeight / 640);

                const left = x - w / 2;
                const top = y - h / 2;

                ctx.strokeRect(left, top, w, h);
                ctx.fillText(
                    `${labels[classId] || classId}: ${(probability * 100).toFixed(1)}%`, 
                    left, top > 10 ? top - 5 : 10
                );
            }
        }
    }

    loadModel();
</script>
</body>
</html>
