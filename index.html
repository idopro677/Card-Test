<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing Card Detector</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

.container{
max-width:800px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

input[type=file]{
margin:10px;
}

canvas{
max-width:100%;
border-radius:10px;
margin-top:15px;
}

#status{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>♠ Playing Card Detector</h1>
<p>Upload an image or take a photo to detect cards.</p>

<button onclick="startCamera()">📷 Use Camera</button>
<input type="file" accept="image/*" onchange="loadImage(event)">

<br>

<video id="camera" width="640" height="480" autoplay style="display:none;"></video>
<br>
<button id="captureBtn" style="display:none;" onclick="capture()">Capture Photo</button>

<canvas id="canvas"></canvas>

<div id="status">Loading model...</div>

</div>

<script>

const classNames = [
"10D","10H","10S","10T","2D","2H","2S","2T","3D","3H","3S","3T",
"4D","4H","4S","4T","5D","5H","5S","5T","6D","6H","6S","6T",
"7D","7H","7S","7T","8D","8H","8S","8T","9D","9H","9S","9T",
"AD","AH","AS","AT","JD","JH","JS","JT","KD","KH","KS","KT",
"QD","QH","QS","QT"
];

let model;
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

async function loadModel(){

model = await tf.loadGraphModel("model/model.json");

document.getElementById("status").innerText="Model loaded ✓";

}

loadModel();

function startCamera(){

const video = document.getElementById("camera");
const captureBtn = document.getElementById("captureBtn");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
video.style.display="block";
captureBtn.style.display="inline-block";
})

}

function capture(){

const video=document.getElementById("camera");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

runModel();

}

function loadImage(event){

const img=new Image();

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

runModel();

};

img.src=URL.createObjectURL(event.target.files[0]);

}

async function runModel(){

document.getElementById("status").innerText="Running detection...";

const input=tf.browser.fromPixels(canvas)
.resizeNearestNeighbor([640,640])
.toFloat()
.div(255.0)
.expandDims();

const prediction=await model.executeAsync(input);

processOutput(prediction);

tf.dispose([input,prediction]);

document.getElementById("status").innerText="Detection complete";

}

function processOutput(prediction){

const data=prediction[0].arraySync();

ctx.lineWidth=3;
ctx.font="18px Arial";

for(let i=0;i<data.length;i++){

let [x,y,w,h,conf,cls]=data[i];

if(conf<0.5) continue;

const label=classNames[Math.round(cls)];

const bx=(x-w/2)*canvas.width;
const by=(y-h/2)*canvas.height;
const bw=w*canvas.width;
const bh=h*canvas.height;

ctx.strokeStyle="lime";
ctx.fillStyle="lime";

ctx.strokeRect(bx,by,bw,bh);

const text=label+" "+(conf*100).toFixed(1)+"%";

ctx.fillText(text,bx,by>20?by-5:20);

}

}

</script>

</body>
</html>
