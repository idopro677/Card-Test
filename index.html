<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Playing Card Detector</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
    
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #status-bar {
            background: #333;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        .upload-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-upload { background-color: #2196F3; color: white; }
        .btn-camera { background-color: #9c27b0; color: white; }
        .btn-run { background-color: var(--primary); color: white; display: none; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        #display-area {
            position: relative;
            margin-top: 20px;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            line-height: 0;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        #hidden-video {
            display: none;
        }

        .guide-text {
            color: #888;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>YOLOv8 Card Vision</h1>
        <div id="status-bar">Initializing TensorFlow.js...</div>
    </div>

    <div class="main-container">
        <div class="upload-section">
            <input type="file" id="file-input" accept="image/*" style="display:none">
            <button class="btn btn-upload" onclick="document.getElementById('file-input').click()">📁 From Storage</button>
            <button class="btn btn-camera" id="camera-btn">📷 Use Camera</button>
            <button class="btn btn-run" id="run-btn">🔥 Run AI Detection</button>
        </div>

        <div id="display-area">
            <canvas id="main-canvas"></canvas>
            <video id="hidden-video" autoplay playsinline></video>
        </div>

        <p class="guide-text">Note: Model expects a folder named 'model' containing model.json and .bin shards.</p>
    </div>

<script>
    const CONFIG = {
        modelPath: 'model/model.json',
        inputSize: 640,
        scoreThreshold: 0.45,
        iouThreshold: 0.3, // Lowered to be stricter (better at preventing double boxes)
        labels: [
            "10D", "10H", "10S", "10T", 
            "2D", "2H", "2S", "2T", 
            "3D", "3H", "3S", "3T", 
            "4D", "4H", "4S", "4T", 
            "5D", "5H", "5S", "5T", 
            "6D", "6H", "6S", "6T", 
            "7D", "7H", "7S", "7T", 
            "8D", "8H", "8S", "8T", 
            "9D", "9H", "9S", "9T", 
            "AD", "AH", "AS", "AT", 
            "JD", "JH", "JS", "JT", 
            "KD", "KH", "KS", "KT", 
            "QD", "QH", "QS", "QT"
        ]
    };

    let model;
    const statusBar = document.getElementById('status-bar');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const runBtn = document.getElementById('run-btn');
    const fileInput = document.getElementById('file-input');
    const video = document.getElementById('hidden-video');
    const cameraBtn = document.getElementById('camera-btn');

    let currentImage = null;

    async function init() {
        try {
            statusBar.innerText = "⏳ Loading AI Model...";
            model = await tf.loadGraphModel(CONFIG.modelPath);
            statusBar.innerText = "✅ Model Loaded. Upload or Take a Photo.";
            statusBar.style.color = "#4CAF50";
        } catch (err) {
            statusBar.innerText = "❌ Error: Folder 'model' or 'model.json' not found.";
            console.error(err);
        }
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                drawImageToCanvas(img);
                runBtn.style.display = "inline-block";
                statusBar.innerText = "Image Ready. Click 'Run AI Detection'.";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    cameraBtn.addEventListener('click', async () => {
        if (cameraBtn.innerText.includes("Capture")) {
            capturePhoto();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            video.style.display = "block";
            canvas.style.display = "none";
            cameraBtn.innerText = "📸 Capture Photo";
            cameraBtn.style.backgroundColor = "#ff5722";
            statusBar.innerText = "Camera Active.";
        } catch (err) {
            alert("Camera access denied.");
        }
    });

    function capturePhoto() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        const stream = video.srcObject;
        stream.getTracks().forEach(track => track.stop());
        
        video.style.display = "none";
        canvas.style.display = "block";
        
        const img = new Image();
        img.onload = () => {
            currentImage = img;
            runBtn.style.display = "inline-block";
        };
        img.src = canvas.toDataURL('image/png');
        
        cameraBtn.innerText = "📷 Use Camera";
        cameraBtn.style.backgroundColor = "#9c27b0";
        statusBar.innerText = "Captured! Click Run AI.";
    }

    function drawImageToCanvas(img) {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
    }

    runBtn.addEventListener('click', async () => {
        if (!model || !currentImage) return;
        statusBar.innerText = "🧠 Analyzing...";
        runBtn.disabled = true;

        const input = tf.tidy(() => {
            return tf.browser.fromPixels(currentImage)
                .resizeNearestNeighbor([CONFIG.inputSize, CONFIG.inputSize])
                .toFloat()
                .div(255.0)
                .expandDims(0);
        });

        const res = await model.executeAsync(input);
        const resArray = res.arraySync()[0]; 
        const detections = processYOLOOutput(resArray, currentImage.width, currentImage.height);
        
        drawDetections(detections);
        statusBar.innerText = `Done! Found ${detections.length} cards.`;
        runBtn.disabled = false;
        tf.dispose([input, res]);
    });

    function processYOLOOutput(output, imgWidth, imgHeight) {
        const boxes = [];
        const scores = [];
        const classIds = [];
        const numPredictions = output[0].length; 
        const numClasses = output.length - 4;

        for (let i = 0; i < numPredictions; i++) {
            let maxScore = 0;
            let classId = -1;
            for (let c = 0; c < numClasses; c++) {
                if (output[4 + c][i] > maxScore) {
                    maxScore = output[4 + c][i];
                    classId = c;
                }
            }

            if (maxScore > CONFIG.scoreThreshold) {
                const cx = output[0][i];
                const cy = output[1][i];
                const w = output[2][i];
                const h = output[3][i];

                const x1 = (cx - w / 2) * (imgWidth / 640);
                const y1 = (cy - h / 2) * (imgHeight / 640);
                const x2 = (cx + w / 2) * (imgWidth / 640);
                const y2 = (cy + h / 2) * (imgHeight / 640);

                boxes.push([y1, x1, y2, x2]);
                scores.push(maxScore);
                classIds.push(classId);
            }
        }

        const nmsIndices = tf.image.nonMaxSuppression(
            tf.tensor2d(boxes), 
            tf.tensor1d(scores), 
            20, 
            CONFIG.iouThreshold, 
            CONFIG.scoreThreshold
        ).arraySync();

        return nmsIndices.map(idx => ({
            box: boxes[idx],
            score: scores[idx],
            class: CONFIG.labels[classIds[idx]]
        }));
    }

    function drawDetections(detections) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(currentImage, 0, 0);

        detections.forEach(det => {
            const [y1, x1, y2, x2] = det.box;
            ctx.strokeStyle = "#00FF00";
            ctx.lineWidth = 4;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            ctx.fillStyle = "#00FF00";
            ctx.font = "bold 20px Arial";
            ctx.fillText(`${det.class} ${Math.round(det.score * 100)}%`, x1, y1 > 25 ? y1 - 10 : y1 + 25);
        });
    }

    init();
</script>
</body>
</html>
